<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReqSploit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="ReqSploit" class="logo-img" onerror="this.style.display='none'">
        <h1>ReqSploit</h1>
      </div>
      <div class="version">v2.1.0 <span class="badge-cdp">CDP</span></div>
    </div>

    <!-- Server Connection Status -->
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">Server</span>
        <div class="status-indicator">
          <span class="status-dot" id="server-status"></span>
          <span class="status-text" id="server-text">Checking...</span>
        </div>
      </div>
    </div>

    <!-- Intercept Toggle -->
    <div class="proxy-section">
      <button class="toggle-btn" id="toggle-intercept">
        <span class="toggle-icon" id="toggle-icon">&#9679;</span>
        <span class="toggle-text" id="toggle-text">Start Intercepting</span>
      </button>
    </div>

    <!-- Response Intercept Toggle -->
    <div class="response-toggle-section" id="response-toggle-section" style="display: none;">
      <label class="switch-label">
        <span class="switch-text">Intercept Responses</span>
        <label class="switch">
          <input type="checkbox" id="response-intercept-toggle">
          <span class="slider"></span>
        </label>
      </label>
    </div>

    <!-- Active Tab Info -->
    <div class="tab-section" id="tab-section" style="display: none;">
      <h3 class="section-title">Attached Tabs</h3>
      <div class="tab-list" id="tab-list"></div>
    </div>

    <!-- Stats -->
    <div class="stats-section" id="stats-section" style="display: none;">
      <div class="stat-card">
        <div class="stat-label">Requests Captured</div>
        <div class="stat-value" id="request-count">0</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="actions-section">
      <button class="action-btn" id="open-dashboard">
        <svg class="action-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3zM14 13a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"></path>
        </svg>
        Open Dashboard
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-text">AI-Powered Security Testing (CDP Mode)</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
